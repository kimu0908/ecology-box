<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Border Ecology Box MVP</title>
    <!-- 引入 A-Frame 核心库 -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
      #ar-ui-layer {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999;
        pointer-events: none; 
        font-family: "Inter", "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
        color: #164f4d;
      }

      #welcome-overlay {
        position: absolute; inset: 0; z-index: 1200;
        pointer-events: auto;
        min-height: 100dvh;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        display: grid; place-items: center;
        padding: clamp(22px, 5vw, 56px);
        padding-bottom: max(48px, env(safe-area-inset-bottom));
        background:
          radial-gradient(circle at 18% 16%, rgba(145, 221, 195, 0.34), transparent 20%),
          radial-gradient(circle at 84% 12%, rgba(151, 211, 234, 0.32), transparent 20%),
          linear-gradient(155deg, rgba(255, 250, 239, 0.96), rgba(232, 249, 239, 0.93));
        transition: opacity 320ms ease, visibility 320ms ease;
      }
      #welcome-overlay.hidden {
        opacity: 0; visibility: hidden; pointer-events: none;
      }
      .welcome-shell {
        width: min(1180px, 100%);
        min-height: auto;
        display: grid;
        grid-template-columns: minmax(0, 0.82fr) minmax(440px, 1.18fr);
        align-items: center;
        gap: clamp(24px, 5vw, 58px);
        padding: clamp(22px, 4vw, 46px);
        border: 1px solid rgba(255, 255, 255, 0.76);
        border-radius: 34px;
        background: rgba(255, 255, 255, 0.48);
        box-shadow: 0 24px 80px rgba(65, 115, 104, 0.18), inset 0 1px 0 rgba(255,255,255,0.9);
        backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
        overflow: hidden;
      }
      .welcome-brand {
        display: inline-flex; align-items: center; gap: 10px;
        color: #28706a; font-size: 14px; font-weight: 800;
        letter-spacing: 0;
      }
      .welcome-mark {
        width: 46px; height: 46px; border-radius: 14px;
        display: grid; place-items: center;
        background: rgba(222, 246, 231, 0.82);
        border: 1px solid rgba(72, 151, 135, 0.28);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
      }
      .welcome-mark::before {
        content: "⌂"; color: #5aa58e; font-size: 28px; line-height: 1;
      }
      .welcome-copy h1 {
        margin: 44px 0 6px;
        color: #134d4d;
        font-size: clamp(48px, 7vw, 82px);
        line-height: 1.02;
        font-weight: 900;
        letter-spacing: 0;
        text-shadow: 0 4px 0 rgba(255,255,255,0.74);
      }
      .welcome-copy h1.ja-title {
        line-height: 1.08;
        letter-spacing: 0.04em;
      }
      .welcome-copy h2 {
        margin: 0 0 28px;
        color: #5a9d83;
        font-size: clamp(22px, 3vw, 34px);
        line-height: 1.15;
        font-weight: 700;
      }
      .welcome-copy p {
        margin: 0 0 36px;
        max-width: 460px;
        color: #2f3d3b;
        font-size: clamp(18px, 2vw, 24px);
        line-height: 1.65;
        font-weight: 650;
      }
      #start-experience {
        pointer-events: auto;
        min-width: min(360px, 100%);
        min-height: 76px;
        border: 1px solid rgba(255,255,255,0.82);
        border-radius: 999px;
        background: linear-gradient(180deg, #9ee8d0, #6ed9bd);
        color: white;
        font-size: clamp(28px, 4vw, 42px);
        font-weight: 900;
        letter-spacing: 0;
        box-shadow: 0 18px 38px rgba(65, 190, 160, 0.34), inset 0 2px 0 rgba(255,255,255,0.55);
      }
      #start-experience::after {
        content: " →"; font-weight: 800;
      }
      #start-experience:disabled {
        cursor: wait;
        opacity: 0.68;
        filter: saturate(0.78);
        box-shadow: 0 10px 24px rgba(96, 150, 135, 0.18), inset 0 2px 0 rgba(255,255,255,0.45);
      }
      #start-experience:disabled::after {
        content: "";
      }
      .welcome-entry-note {
        min-height: 24px;
        margin-top: 12px;
        color: #5f8179;
        font-size: 14px;
        font-weight: 700;
      }
      .welcome-terrarium {
        position: relative;
        min-height: clamp(420px, 58dvh, 620px);
        border-radius: 36px;
        border: 2px solid rgba(255,255,255,0.72);
        background:
          linear-gradient(180deg, rgba(214, 241, 246, 0.72), rgba(255, 244, 216, 0.68)),
          radial-gradient(circle at 50% 78%, rgba(124, 211, 161, 0.3), transparent 34%);
        box-shadow: inset 0 0 44px rgba(255,255,255,0.84), 0 22px 54px rgba(60, 105, 96, 0.18);
        overflow: hidden;
      }
      .welcome-terrarium::before {
        content: "";
        position: absolute; inset: 7% 7% 13%;
        border-radius: 32px;
        border: 1px solid rgba(255,255,255,0.7);
        background:
          radial-gradient(circle at 24% 76%, #dff2d7 0 7%, transparent 8%),
          radial-gradient(circle at 70% 78%, #cbe8e8 0 8%, transparent 9%),
          linear-gradient(180deg, rgba(255,255,255,0.42), rgba(255,255,255,0.08));
        box-shadow: inset 0 0 36px rgba(255,255,255,0.72), 0 0 0 999px rgba(255,255,255,0.05);
      }
      .welcome-visual-placeholder {
        position: absolute; inset: 8% 7% 14%;
        border-radius: 32px;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        align-items: center;
        gap: clamp(24px, 3vw, 38px);
        padding: clamp(26px, 3vw, 42px);
      }
      .welcome-orbit {
        position: absolute; left: 50%; top: 50%;
        width: min(112%, 190px); aspect-ratio: 1;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        border: 2px dashed rgba(255,255,255,0.9);
        box-shadow: 0 0 18px rgba(117, 225, 205, 0.5);
      }
      .welcome-orbit.one { background: rgba(116, 210, 238, 0.22); }
      .welcome-orbit.two { background: rgba(255, 172, 144, 0.2); }
      .welcome-orbit.three { background: rgba(136, 218, 160, 0.22); }
      .welcome-animal {
        position: relative;
        z-index: 2;
        display: grid; place-items: center;
        width: min(100%, clamp(128px, 13vw, 168px));
        aspect-ratio: 1;
        border-radius: 999px;
        background: transparent;
        border: 0;
        box-shadow: none;
        margin: 0 auto;
      }
      .welcome-animal img {
        width: 86%;
        height: 86%;
        object-fit: contain;
        background: transparent;
      }
      .welcome-creature-card {
        position: relative;
        min-height: clamp(260px, 32vw, 360px);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 12px;
      }
      .welcome-creature-card:nth-child(2) {
        transform: translateY(-22px);
      }
      .welcome-creature-card:nth-child(2) .welcome-animal {
        width: min(100%, clamp(142px, 14vw, 190px));
      }
      .welcome-tag {
        z-index: 3;
        position: static;
        padding: 8px 12px;
        border-radius: 16px;
        background: rgba(255,255,255,0.7);
        border: 1px solid rgba(255,255,255,0.84);
        color: #447167;
        font-weight: 850;
        font-size: clamp(12px, 1.5vw, 18px);
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        text-align: center;
        max-width: 100%;
        white-space: normal;
        overflow-wrap: anywhere;
        word-break: keep-all;
        line-height: 1.35;
        box-shadow: 0 10px 22px rgba(84, 113, 104, 0.12);
      }
      body.lang-ja .welcome-tag {
        font-size: clamp(12px, 1.2vw, 15px);
        letter-spacing: 0.02em;
        line-height: 1.35;
      }
      .welcome-tag.space { color: #2672a2; }
      .welcome-tag.repair { color: #c46f4c; }
      .welcome-tag.slow { color: #4e7a55; }
      .welcome-note {
        position: absolute; left: 50%; bottom: 26px; transform: translateX(-50%);
        width: min(78%, 460px);
        padding: 14px 18px;
        border-radius: 20px;
        background: rgba(255,255,255,0.72);
        color: #52645e;
        text-align: center;
        font-weight: 800;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      }

      #octopus-screen-filter {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000;
        pointer-events: none; display: none; opacity: 0;
        transition: opacity 420ms ease;
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        background: rgba(50, 205, 50, 0.6);
        animation: pulse-filter 2s infinite alternate;
      }
      #octopus-screen-filter.active {
        opacity: 1;
      }
      @keyframes pulse-filter {
        0% { background: rgba(50, 205, 50, 0.5); }
        100% { background: rgba(50, 205, 50, 0.75); }
      }
      
      #distance-ui {
        position: absolute; top: 18px; left: 18px; z-index: 1001;
        max-width: min(46vw, 360px);
        background: rgba(255, 255, 255, 0.52);
        backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.72);
        color: rgba(38, 87, 80, 0.72);
        font-family: monospace; font-size: 11px; line-height: 1.25;
        padding: 8px 11px; border-radius: 14px; pointer-events: none;
        box-shadow: 0 8px 24px rgba(52, 84, 77, 0.11);
        opacity: 0.42;
      }

      #placement-debug {
        display: none;
        position: absolute; right: 12px; bottom: 112px; z-index: 1002;
        pointer-events: none; text-align: right;
      }
      #placement-debug-toggle {
        pointer-events: auto;
        background: rgba(0, 0, 0, 0.45); color: #00ff88;
        border: 1px solid rgba(0, 255, 136, 0.5);
        border-radius: 6px; padding: 5px 8px;
        font-family: monospace; font-size: 11px;
      }
      #placement-debug-body {
        display: none; margin-top: 6px;
        background: rgba(0, 0, 0, 0.55); color: #00ff88;
        font-family: monospace; font-size: 10px; line-height: 1.3;
        padding: 7px 8px; border-radius: 6px; white-space: pre;
      }
      #placement-debug.expanded #placement-debug-body {
        display: block;
      }

      #instruction-text {
        position: absolute; bottom: 136px; left: 50%; transform: translateX(-50%); z-index: 1001;
        width: min(76vw, 720px);
        min-height: 54px;
        display: flex; align-items: center; justify-content: center;
        background: rgba(255, 253, 246, 0.72); color: #315d55;
        padding: 14px 26px; border-radius: 24px;
        border: 1px solid rgba(255,255,255,0.84);
        font-size: clamp(17px, 2.4vw, 26px); font-weight: 800;
        text-align: center;
        white-space: normal;
        line-height: 1.35;
        pointer-events: none;
        box-shadow: 0 18px 38px rgba(51, 88, 78, 0.16), inset 0 1px 0 rgba(255,255,255,0.92);
        backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      }
      #instruction-text.warning {
        background: rgba(255, 238, 232, 0.88);
        color: #8f3b2f;
        border-color: rgba(255, 120, 100, 0.9);
        box-shadow: 0 18px 38px rgba(170, 60, 40, 0.22), inset 0 1px 0 rgba(255,255,255,0.92);
      }
      #instruction-text.success {
        background: rgba(235, 250, 240, 0.88);
        color: #2f6f55;
        border-color: rgba(106, 205, 145, 0.82);
        box-shadow: 0 18px 38px rgba(58, 135, 92, 0.18), inset 0 1px 0 rgba(255,255,255,0.92);
      }
      #mentor-card {
        position: absolute;
        right: 22px;
        top: 158px;
        z-index: 1002;
        width: min(340px, 78vw);
        padding: 18px 18px 16px;
        border-radius: 24px;
        border: 1px solid rgba(255,255,255,0.84);
        background: rgba(255, 253, 246, 0.82);
        color: #2d5750;
        box-shadow: 0 18px 42px rgba(48, 87, 76, 0.2), inset 0 1px 0 rgba(255,255,255,0.92);
        backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
        pointer-events: auto;
        transition: opacity 240ms ease, transform 240ms ease, visibility 240ms ease;
      }
      #mentor-card.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transform: translateY(-8px);
      }
      .mentor-card-title {
        font-size: clamp(18px, 2.3vw, 24px);
        font-weight: 900;
        color: #246b62;
        margin-bottom: 8px;
      }
      .mentor-card-body {
        font-size: clamp(14px, 1.8vw, 18px);
        line-height: 1.55;
        font-weight: 700;
        white-space: pre-line;
      }
      .mentor-card-close {
        margin-top: 14px;
        border: 1px solid rgba(255,255,255,0.8);
        border-radius: 999px;
        background: rgba(137, 224, 198, 0.72);
        color: #245f58;
        padding: 8px 16px;
        font-size: 15px;
        font-weight: 850;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.65);
      }
      @keyframes breathe {
        0% { opacity: 0.7; transform: translateX(-50%) scale(0.98); }
        50% { opacity: 1; transform: translateX(-50%) scale(1.02); }
        100% { opacity: 0.7; transform: translateX(-50%) scale(0.98); }
      }

      #mode-selector {
        position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
        width: min(92vw, 720px); z-index: 1001;
        display: flex; justify-content: center; gap: clamp(16px, 3vw, 28px);
        pointer-events: none; 
      }

      #ar-top-actions {
        position: absolute; top: 22px; right: 22px; z-index: 1001;
        display: flex; flex-direction: column; gap: 10px;
        align-items: flex-end;
        pointer-events: auto;
      }

      #reset-placement,
      #return-home,
      #collection-open,
      #sound-toggle {
        pointer-events: auto;
        min-height: 48px;
        background: rgba(255, 253, 246, 0.7); color: #4f806a;
        border: 1px solid rgba(255, 255, 255, 0.86);
        border-radius: 999px; padding: 10px 18px;
        font-size: clamp(15px, 2vw, 24px); font-weight: 850;
        backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
        box-shadow: 0 12px 28px rgba(52, 84, 77, 0.15), inset 0 1px 0 rgba(255,255,255,0.9);
      }
      #reset-placement::before { content: "↻ "; font-size: 1.1em; }
      #return-home::before { content: "⌂ "; font-size: 1.1em; }
      #collection-open::before { content: "◇ "; font-size: 1.1em; }
      #sound-toggle::before { content: "♪ "; font-size: 1.1em; }
      .welcome-sound-toggle {
        position: absolute;
        top: 22px;
        right: 22px;
        z-index: 3;
        pointer-events: auto;
        min-height: 46px;
        border: 1px solid rgba(255,255,255,0.86);
        border-radius: 999px;
        background: rgba(255, 253, 246, 0.72);
        color: #4f806a;
        padding: 9px 16px;
        font-size: 16px;
        font-weight: 850;
        box-shadow: 0 12px 28px rgba(52, 84, 77, 0.15), inset 0 1px 0 rgba(255,255,255,0.9);
        backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      }
      .welcome-sound-toggle::before { content: "♪ "; }
      .language-panel {
        position: absolute;
        left: 16px;
        z-index: 1301;
        pointer-events: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
        color: #315f58;
      }
      .language-panel.on-welcome {
        top: 16px;
      }
      .language-panel.in-ar {
        top: 126px;
      }
      .language-label {
        padding-left: 4px;
        font-size: 12px;
        font-weight: 850;
        opacity: 0.74;
      }
      .language-options {
        display: flex;
        gap: 6px;
        padding: 5px;
        border-radius: 999px;
        background: rgba(255, 253, 246, 0.58);
        border: 1px solid rgba(255,255,255,0.82);
        box-shadow: 0 10px 24px rgba(52, 84, 77, 0.12), inset 0 1px 0 rgba(255,255,255,0.82);
        backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      }
      .language-options button {
        pointer-events: auto;
        min-height: 34px;
        border: 0;
        border-radius: 999px;
        padding: 7px 12px;
        background: transparent;
        color: #5a7a72;
        font-size: 14px;
        font-weight: 900;
        white-space: nowrap;
      }
      .language-options button.active {
        background: rgba(255,255,255,0.92);
        color: #2f5f55;
        box-shadow: 0 6px 16px rgba(56, 128, 108, 0.16);
      }

      .mode-btn {
        pointer-events: auto;
        position: relative;
        background: rgba(255, 255, 255, 0.68);
        backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
        border: 2px solid rgba(255, 255, 255, 0.9);
        border-radius: 28px; width: clamp(92px, 18vw, 160px); height: clamp(82px, 14vw, 118px);
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
        padding: 8px 10px; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        box-shadow: 0 12px 28px rgba(61, 97, 89, 0.14), inset 0 1px 0 rgba(255,255,255,0.95);
      }
      .mode-btn:hover { background: rgba(255, 255, 255, 0.78); transform: translateY(-2px); }
      .mode-btn.active {
        background: rgba(232, 255, 244, 0.86);
        border-color: #b8f5dc;
        box-shadow: 0 0 0 4px rgba(138, 236, 201, 0.34), 0 18px 34px rgba(55, 184, 150, 0.22), inset 0 1px 0 rgba(255,255,255,0.96);
      }
      .mode-btn img {
        width: clamp(44px, 8vw, 72px); height: clamp(44px, 8vw, 72px); object-fit: contain;
        background: transparent;
      }
      .mode-btn span {
        color: #286c66;
        font-size: clamp(14px, 2.2vw, 22px);
        line-height: 1;
        font-weight: 900;
      }
      #btn-octopus span { color: #6b55a0; }
      #btn-hedgehog span { color: #4f7a55; }

      #collection-overlay {
        position: absolute;
        inset: 0;
        z-index: 1003;
        display: grid;
        place-items: center;
        padding: 22px;
        background: rgba(230, 248, 240, 0.28);
        backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
        pointer-events: auto;
        transition: opacity 240ms ease, visibility 240ms ease;
      }
      #collection-overlay.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .collection-panel {
        width: min(920px, 94vw);
        max-height: min(82dvh, 720px);
        overflow-y: auto;
        padding: clamp(18px, 3vw, 30px);
        border-radius: 30px;
        border: 1px solid rgba(255,255,255,0.84);
        background:
          radial-gradient(circle at 12% 8%, rgba(154, 226, 198, 0.34), transparent 24%),
          radial-gradient(circle at 88% 18%, rgba(158, 212, 238, 0.3), transparent 22%),
          rgba(255, 253, 246, 0.86);
        box-shadow: 0 24px 68px rgba(44, 83, 75, 0.24), inset 0 1px 0 rgba(255,255,255,0.92);
      }
      .collection-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 18px;
      }
      .collection-title {
        margin: 0;
        color: #185a55;
        font-size: clamp(28px, 4vw, 44px);
        font-weight: 950;
        letter-spacing: 0;
        word-break: keep-all;
        overflow-wrap: anywhere;
        line-break: strict;
      }
      .collection-subtitle {
        margin: 6px 0 0;
        color: #557a72;
        font-size: clamp(15px, 2vw, 20px);
        font-weight: 750;
        word-break: keep-all;
        overflow-wrap: anywhere;
        line-break: strict;
      }
      .collection-close {
        flex: none;
        border: 1px solid rgba(255,255,255,0.86);
        border-radius: 999px;
        background: rgba(137, 224, 198, 0.72);
        color: #245f58;
        padding: 10px 16px;
        font-size: 16px;
        font-weight: 850;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
      }
      .collection-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: clamp(12px, 2vw, 20px);
      }
      .collection-card {
        min-height: 250px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 16px 14px 18px;
        border-radius: 24px;
        border: 1px solid rgba(255,255,255,0.82);
        background: rgba(255,255,255,0.62);
        box-shadow: 0 14px 32px rgba(46, 86, 77, 0.13), inset 0 1px 0 rgba(255,255,255,0.92);
        text-align: center;
      }
      .collection-card:not(.learned) {
        opacity: 0.58;
        filter: grayscale(0.75);
      }
      .collection-card.learned {
        background: rgba(238, 255, 245, 0.78);
        box-shadow: 0 16px 36px rgba(96, 190, 154, 0.22), inset 0 1px 0 rgba(255,255,255,0.95);
      }
      .collection-card img {
        width: min(130px, 28vw);
        aspect-ratio: 1 / 1;
        object-fit: contain;
        background: transparent;
      }
      .collection-card h3 {
        margin: 0;
        color: #225e59;
        font-size: clamp(21px, 2.4vw, 28px);
        font-weight: 950;
        word-break: keep-all;
        overflow-wrap: anywhere;
        line-break: strict;
      }
      .collection-type {
        color: #5f8d7a;
        font-size: 15px;
        font-weight: 850;
        word-break: keep-all;
        overflow-wrap: anywhere;
        line-break: strict;
      }
      .collection-desc {
        margin: 4px 0 0;
        color: #314f4a;
        font-size: 15px;
        line-height: 1.42;
        font-weight: 720;
        word-break: keep-all;
        overflow-wrap: anywhere;
        line-break: strict;
      }
      body.lang-ja .collection-title {
        letter-spacing: 0.04em;
        line-height: 1.15;
      }

          // === 模型加载后清理：删除模型内嵌的巨大背景平面 ===
          var self = this;

          function cleanupModel(el) {
              if (!el) return;
              el.addEventListener('model-loaded', function() {
                  var toRemove = [];
                  el.object3D.traverse(function(child) {
                      if (child.isMesh) {
                          child.geometry.computeBoundingBox();
                          var box = child.geometry.boundingBox;
                          var size = new THREE.Vector3();
                          box.getSize(size);
                          // 如果某个 mesh 的任何一个维度超过 5 单位，判定为背景/地面
                          if (size.x > 5 || size.y > 5 || size.z > 5) {
                              toRemove.push(child);
                          }
                      }
                  });
                  toRemove.forEach(function(mesh) {
                      mesh.parent.remove(mesh);
                      console.log('Removed background mesh:', mesh.name, mesh.geometry.boundingBox);
                  });
              });
          }

          cleanupModel(this.visuals.hedgehog);

          if (this.visuals.pufferfish) this.visuals.pufferfish.addEventListener('model-loaded', function() {
              var box = new THREE.Box3().setFromObject(self.visuals.pufferfish.object3D);
              var center = new THREE.Vector3();
              var size = new THREE.Vector3();
              box.getCenter(center);
              box.getSize(size);
              console.log('Pufferfish model loaded', {
                  center: { x: center.x, y: center.y, z: center.z },
                  size: { x: size.x, y: size.y, z: size.z }
              });
          });

          // 刺猬模型加载完成后，保存其原始材质以便故障后恢复
          if (this.visuals.hedgehog) this.visuals.hedgehog.addEventListener('model-loaded', function() {

        handleMotion: function(event) {
             this.lastMotionTime = performance.now();
             if (this.mode !== 'octopus' || !this.isOctopusAttached) return;
             
             var acc = event.accelerationIncludingGravity || event.acceleration;
             if (!acc || acc.x === null) return;
             
             if (this.lastAcc) {
                 var dx = Math.abs(acc.x - this.lastAcc.x);
                 var dy = Math.abs(acc.y - this.lastAcc.y);
                 var dz = Math.abs(acc.z - this.lastAcc.z);
                 var deltaSum = dx + dy + dz;
                 this.lastShakeDelta = deltaSum;
                 
                if (deltaSum > 25 && this.octopusState === 'readyToShake') {
                     this.motionReleaseCount++;
                     this.releaseOctopus();
                 } else if (deltaSum > 25 && this.octopusState === 'stuckTooClose') {
                     this.setOctopusHintState('stuckTooClose');
                 }
             }
             this.lastAcc = { x: acc.x, y: acc.y, z: acc.z };
        },

           Object.keys(files).forEach(name => {

        toggleSound: function() {
           var onWelcome = this.isWelcomeVisible();
           var nextEnabled = !this.homeBgmEnabled;
           this.homeBgmEnabled = nextEnabled;
           this.guideVoiceEnabled = nextEnabled;
           this.soundEnabled = nextEnabled;

           localStorage.setItem('boundaryTerrariumGuideVoice', this.guideVoiceEnabled ? 'true' : 'false');
           localStorage.setItem('boundaryTerrariumSfx', this.soundEnabled ? 'true' : 'false');
           console.log('[HOME BGM] enabled:', this.homeBgmEnabled);
           if (this.homeBgmEnabled && onWelcome) {
