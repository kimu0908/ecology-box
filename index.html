<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Border Ecology Box MVP</title>
    <!-- 引入 A-Frame 核心库 -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
      #ar-ui-layer {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999;
        pointer-events: none; 
        font-family: "Inter", "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
        color: #164f4d;
      }

      #welcome-overlay {
        position: absolute; inset: 0; z-index: 1200;
        pointer-events: auto;
        min-height: 100dvh;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        display: grid; place-items: center;
        padding: clamp(22px, 5vw, 56px);
        padding-bottom: max(48px, env(safe-area-inset-bottom));
        background:
          radial-gradient(circle at 18% 16%, rgba(145, 221, 195, 0.34), transparent 20%),
          radial-gradient(circle at 84% 12%, rgba(151, 211, 234, 0.32), transparent 20%),
          linear-gradient(155deg, rgba(255, 250, 239, 0.96), rgba(232, 249, 239, 0.93));
        transition: opacity 320ms ease, visibility 320ms ease;
      }
      #welcome-overlay.hidden {
        opacity: 0; visibility: hidden; pointer-events: none;
      }
      .welcome-shell {
        width: min(1180px, 100%);
        min-height: auto;
        display: grid;
        grid-template-columns: minmax(0, 0.82fr) minmax(440px, 1.18fr);
        align-items: center;
        gap: clamp(24px, 5vw, 58px);
        padding: clamp(22px, 4vw, 46px);
        border: 1px solid rgba(255, 255, 255, 0.76);
        border-radius: 34px;
        background: rgba(255, 255, 255, 0.48);
        box-shadow: 0 24px 80px rgba(65, 115, 104, 0.18), inset 0 1px 0 rgba(255,255,255,0.9);
        backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
        overflow: hidden;
      }
      .welcome-brand {
        display: inline-flex; align-items: center; gap: 10px;
        color: #28706a; font-size: 14px; font-weight: 800;
        letter-spacing: 0;
      }
      .welcome-mark {
        width: 46px; height: 46px; border-radius: 14px;
        display: grid; place-items: center;
        background: rgba(222, 246, 231, 0.82);
        border: 1px solid rgba(72, 151, 135, 0.28);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
      }
      .welcome-mark::before {
        content: "⌂"; color: #5aa58e; font-size: 28px; line-height: 1;
      }
      .welcome-copy h1 {
        margin: 44px 0 6px;
        color: #134d4d;
        font-size: clamp(48px, 7vw, 82px);
        line-height: 1.02;
        font-weight: 900;
        letter-spacing: 0;
        text-shadow: 0 4px 0 rgba(255,255,255,0.74);
      }
      .welcome-copy h2 {
        margin: 0 0 28px;
        color: #5a9d83;
        font-size: clamp(22px, 3vw, 34px);
        line-height: 1.15;
        font-weight: 700;
      }
      .welcome-copy p {
        margin: 0 0 36px;
        max-width: 460px;
        color: #2f3d3b;
        font-size: clamp(18px, 2vw, 24px);
        line-height: 1.65;
        font-weight: 650;
      }
      #start-experience {
        pointer-events: auto;
        min-width: min(360px, 100%);
        min-height: 76px;
        border: 1px solid rgba(255,255,255,0.82);
        border-radius: 999px;
        background: linear-gradient(180deg, #9ee8d0, #6ed9bd);
        color: white;
        font-size: clamp(28px, 4vw, 42px);
        font-weight: 900;
        letter-spacing: 0;
        box-shadow: 0 18px 38px rgba(65, 190, 160, 0.34), inset 0 2px 0 rgba(255,255,255,0.55);
      }
      #start-experience::after {
        content: " →"; font-weight: 800;
      }
      .welcome-entry-note {
        min-height: 24px;
        margin-top: 12px;
        color: #5f8179;
        font-size: 14px;
        font-weight: 700;
      }
      .welcome-terrarium {
        position: relative;
        min-height: clamp(420px, 58dvh, 620px);
        border-radius: 36px;
        border: 2px solid rgba(255,255,255,0.72);
        background:
          linear-gradient(180deg, rgba(214, 241, 246, 0.72), rgba(255, 244, 216, 0.68)),
          radial-gradient(circle at 50% 78%, rgba(124, 211, 161, 0.3), transparent 34%);
        box-shadow: inset 0 0 44px rgba(255,255,255,0.84), 0 22px 54px rgba(60, 105, 96, 0.18);
        overflow: hidden;
      }
      .welcome-terrarium::before {
        content: "";
        position: absolute; inset: 7% 7% 13%;
        border-radius: 32px;
        border: 1px solid rgba(255,255,255,0.7);
        background:
          radial-gradient(circle at 24% 76%, #dff2d7 0 7%, transparent 8%),
          radial-gradient(circle at 70% 78%, #cbe8e8 0 8%, transparent 9%),
          linear-gradient(180deg, rgba(255,255,255,0.42), rgba(255,255,255,0.08));
        box-shadow: inset 0 0 36px rgba(255,255,255,0.72), 0 0 0 999px rgba(255,255,255,0.05);
      }
      .welcome-visual-placeholder {
        position: absolute; inset: 8% 7% 14%;
        border-radius: 32px;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        align-items: center;
        gap: clamp(24px, 3vw, 38px);
        padding: clamp(26px, 3vw, 42px);
      }
      .welcome-orbit {
        position: absolute; left: 50%; top: 50%;
        width: min(112%, 190px); aspect-ratio: 1;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        border: 2px dashed rgba(255,255,255,0.9);
        box-shadow: 0 0 18px rgba(117, 225, 205, 0.5);
      }
      .welcome-orbit.one { background: rgba(116, 210, 238, 0.22); }
      .welcome-orbit.two { background: rgba(255, 172, 144, 0.2); }
      .welcome-orbit.three { background: rgba(136, 218, 160, 0.22); }
      .welcome-animal {
        position: relative;
        z-index: 2;
        display: grid; place-items: center;
        width: min(100%, clamp(112px, 11vw, 150px));
        aspect-ratio: 1;
        border-radius: 999px;
        background: rgba(255,255,255,0.78);
        border: 1px solid rgba(255,255,255,0.94);
        box-shadow: 0 15px 34px rgba(91, 118, 110, 0.2);
        margin: 0 auto;
      }
      .welcome-animal img {
        width: 74%;
        height: 74%;
        object-fit: contain;
      }
      .welcome-creature-card {
        position: relative;
        min-height: clamp(260px, 32vw, 360px);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 18px;
      }
      .welcome-creature-card:nth-child(2) {
        transform: translateY(-22px);
      }
      .welcome-creature-card:nth-child(2) .welcome-animal {
        width: min(100%, clamp(128px, 13vw, 174px));
      }
      .welcome-tag {
        z-index: 3;
        position: static;
        padding: 8px 12px;
        border-radius: 16px;
        background: rgba(255,255,255,0.7);
        border: 1px solid rgba(255,255,255,0.84);
        color: #447167;
        font-weight: 850;
        font-size: clamp(12px, 1.5vw, 18px);
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        text-align: center;
        white-space: nowrap;
        box-shadow: 0 10px 22px rgba(84, 113, 104, 0.12);
      }
      .welcome-tag.space { color: #2672a2; }
      .welcome-tag.repair { color: #c46f4c; }
      .welcome-tag.slow { color: #4e7a55; }
      .welcome-note {
        position: absolute; left: 50%; bottom: 26px; transform: translateX(-50%);
        width: min(78%, 460px);
        padding: 14px 18px;
        border-radius: 20px;
        background: rgba(255,255,255,0.72);
        color: #52645e;
        text-align: center;
        font-weight: 800;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      }

      #octopus-screen-filter {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000;
        pointer-events: none; display: none; opacity: 0;
        transition: opacity 420ms ease;
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        background: rgba(50, 205, 50, 0.6);
        animation: pulse-filter 2s infinite alternate;
      }
      #octopus-screen-filter.active {
        opacity: 1;
      }
      @keyframes pulse-filter {
        0% { background: rgba(50, 205, 50, 0.5); }
        100% { background: rgba(50, 205, 50, 0.75); }
      }
      
      #distance-ui {
        position: absolute; top: 18px; left: 18px; z-index: 1001;
        max-width: min(46vw, 360px);
        background: rgba(255, 255, 255, 0.52);
        backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.72);
        color: rgba(38, 87, 80, 0.72);
        font-family: monospace; font-size: 11px; line-height: 1.25;
        padding: 8px 11px; border-radius: 14px; pointer-events: none;
        box-shadow: 0 8px 24px rgba(52, 84, 77, 0.11);
        opacity: 0.42;
      }

      #placement-debug {
        display: none;
        position: absolute; right: 12px; bottom: 112px; z-index: 1002;
        pointer-events: none; text-align: right;
      }
      #placement-debug-toggle {
        pointer-events: auto;
        background: rgba(0, 0, 0, 0.45); color: #00ff88;
        border: 1px solid rgba(0, 255, 136, 0.5);
        border-radius: 6px; padding: 5px 8px;
        font-family: monospace; font-size: 11px;
      }
      #placement-debug-body {
        display: none; margin-top: 6px;
        background: rgba(0, 0, 0, 0.55); color: #00ff88;
        font-family: monospace; font-size: 10px; line-height: 1.3;
        padding: 7px 8px; border-radius: 6px; white-space: pre;
      }
      #placement-debug.expanded #placement-debug-body {
        display: block;
      }

      #instruction-text {
        position: absolute; bottom: 136px; left: 50%; transform: translateX(-50%); z-index: 1001;
        width: min(76vw, 720px);
        min-height: 54px;
        display: flex; align-items: center; justify-content: center;
        background: rgba(255, 253, 246, 0.72); color: #315d55;
        padding: 14px 26px; border-radius: 24px;
        border: 1px solid rgba(255,255,255,0.84);
        font-size: clamp(17px, 2.4vw, 26px); font-weight: 800;
        text-align: center;
        white-space: normal;
        line-height: 1.35;
        pointer-events: none;
        box-shadow: 0 18px 38px rgba(51, 88, 78, 0.16), inset 0 1px 0 rgba(255,255,255,0.92);
        backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      }
      @keyframes breathe {
        0% { opacity: 0.7; transform: translateX(-50%) scale(0.98); }
        50% { opacity: 1; transform: translateX(-50%) scale(1.02); }
        100% { opacity: 0.7; transform: translateX(-50%) scale(0.98); }
      }

      #mode-selector {
        position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
        width: min(92vw, 720px); z-index: 1001;
        display: flex; justify-content: center; gap: clamp(16px, 3vw, 28px);
        pointer-events: none; 
      }

      #ar-top-actions {
        position: absolute; top: 22px; right: 22px; z-index: 1001;
        display: flex; flex-direction: column; gap: 10px;
        align-items: flex-end;
        pointer-events: auto;
      }

      #reset-placement,
      #return-home {
        pointer-events: auto;
        min-height: 48px;
        background: rgba(255, 253, 246, 0.7); color: #4f806a;
        border: 1px solid rgba(255, 255, 255, 0.86);
        border-radius: 999px; padding: 10px 18px;
        font-size: clamp(15px, 2vw, 24px); font-weight: 850;
        backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
        box-shadow: 0 12px 28px rgba(52, 84, 77, 0.15), inset 0 1px 0 rgba(255,255,255,0.9);
      }
      #reset-placement::before { content: "↻ "; font-size: 1.1em; }
      #return-home::before { content: "⌂ "; font-size: 1.1em; }

      .mode-btn {
        pointer-events: auto;
        position: relative;
        background: rgba(255, 255, 255, 0.68);
        backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
        border: 2px solid rgba(255, 255, 255, 0.9);
        border-radius: 28px; width: clamp(92px, 18vw, 160px); height: clamp(82px, 14vw, 118px);
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
        padding: 8px 10px; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        box-shadow: 0 12px 28px rgba(61, 97, 89, 0.14), inset 0 1px 0 rgba(255,255,255,0.95);
      }
      .mode-btn:hover { background: rgba(255, 255, 255, 0.78); transform: translateY(-2px); }
      .mode-btn.active {
        background: rgba(232, 255, 244, 0.86);
        border-color: #b8f5dc;
        box-shadow: 0 0 0 4px rgba(138, 236, 201, 0.34), 0 18px 34px rgba(55, 184, 150, 0.22), inset 0 1px 0 rgba(255,255,255,0.96);
      }
      .mode-btn img {
        width: clamp(44px, 8vw, 72px); height: clamp(44px, 8vw, 72px); object-fit: contain;
      }
      .mode-btn span {
        color: #286c66;
        font-size: clamp(14px, 2.2vw, 22px);
        line-height: 1;
        font-weight: 900;
      }
      #btn-octopus span { color: #6b55a0; }
      #btn-hedgehog span { color: #4f7a55; }

      .a-enter-vr,
      .a-enter-ar {
        opacity: 0.32;
        transform: scale(0.82);
        transform-origin: right bottom;
        filter: saturate(0.75);
      }

      @media (orientation: landscape) and (min-width: 760px) {
        #welcome-overlay {
          align-items: start;
        }
        .welcome-shell {
          margin: auto 0;
        }
        #instruction-text {
          bottom: 124px;
          width: min(58vw, 760px);
        }
        #mode-selector {
          width: min(62vw, 760px);
          bottom: 20px;
        }
        #distance-ui {
          max-width: 390px;
          opacity: 0.55;
        }
      }

      @media (max-width: 720px) {
        #welcome-overlay {
          padding: 18px;
          padding-bottom: max(48px, env(safe-area-inset-bottom));
          align-items: start;
        }
        .welcome-shell {
          min-height: auto;
          grid-template-columns: 1fr;
          gap: 16px;
          padding: 22px 18px;
          border-radius: 28px;
        }
        .welcome-copy { text-align: center; }
        .welcome-brand { justify-content: center; }
        .welcome-copy h1 { margin-top: 24px; }
        .welcome-copy p { margin-left: auto; margin-right: auto; }
        #start-experience { min-height: 68px; }
        .welcome-terrarium {
          grid-row: 2;
          min-height: min(50dvh, 430px);
          order: -1;
        }
        .welcome-visual-placeholder {
          grid-template-columns: repeat(3, minmax(0, 1fr));
          gap: 8px;
          padding: 16px 10px 22px;
        }
        .welcome-creature-card { min-height: 170px; gap: 8px; }
        .welcome-creature-card:nth-child(2) { transform: translateY(-10px); }
        .welcome-animal { width: clamp(76px, 24vw, 110px); }
        .welcome-creature-card:nth-child(2) .welcome-animal { width: clamp(84px, 26vw, 120px); }
        .welcome-orbit { width: min(120%, 128px); }
        .welcome-tag {
          display: block;
          padding: 7px 8px;
          font-size: 12px;
          white-space: normal;
        }
        #distance-ui {
          top: 16px; left: 14px;
          max-width: 38vw;
          font-size: 9px;
          padding: 6px 8px;
          opacity: 0.28;
        }
        #ar-top-actions {
          top: 16px; right: 14px;
          gap: 8px;
        }
        #reset-placement,
        #return-home {
          min-height: 42px;
          padding: 8px 13px;
        }
        #instruction-text {
          bottom: 144px;
          width: calc(100vw - 40px);
          min-height: 76px;
          padding: 14px 18px;
          border-radius: 22px;
        }
        #mode-selector {
          bottom: 24px;
          width: calc(100vw - 28px);
          gap: 12px;
        }
        .mode-btn {
          flex: 1 1 0;
          width: auto;
          height: 96px;
          border-radius: 24px;
        }
      }
    </style>

      <script>
      const HEDGEHOG_YAW = 180;

      AFRAME.registerComponent('ar-game-manager', {
        schema: {
          anchor: { type: 'selector' }
        },
        init: function () {
          this.mode = 'pufferfish';
          this.isSpawned = false;
          this.spawnPosition = null; 
          this.groundYOffset = -0.08;
          this.prevCameraPos = new THREE.Vector3();
          
          this.isOctopusAttached = false;
          this.octopusCooldown = 0;
          this.lastAcc = null;
          this.motionListening = false;
          this.lastShakeDelta = 0;
          this.lastMotionTime = 0;
          this.motionPermissionState = 'unknown';
          this.motionReleaseCount = 0;
          
          // [刺猬猫专有属性]
          this.previousDistance = null;
          this.hedgehogState = 'idle'; // 状态: idle, alarm, waiting, friend
          this.hedgehogTimer = null;
          this.hedgehogSlowApproachPraised = false;
          this.hedgehogOriginalMaterials = []; // 保存原始材质以便恢复

          this.uiEl = document.getElementById('distance-ui');
          this.modeSelector = document.getElementById('mode-selector');
          this.instructionEl = document.getElementById('instruction-text');
          this.octopusFilterEl = document.getElementById('octopus-screen-filter');
          this.placementDebugEl = document.getElementById('placement-debug');
          this.placementDebugBodyEl = document.getElementById('placement-debug-body');
          this.placementDebugToggleEl = document.getElementById('placement-debug-toggle');
          this.welcomeOverlayEl = document.getElementById('welcome-overlay');
          this.startExperienceEl = document.getElementById('start-experience');
          this.welcomeEntryNoteEl = document.querySelector('.welcome-entry-note');
          this.returnHomeEl = document.getElementById('return-home');
          this.placementDebugEnabled = true;
          this.placementDebugExpanded = false;
          this.lastDebugUpdate = 0;
          this.reticlePosition = null;
          this.correctedAnchorPosition = null;
          this.currentHint = '';
          this.hintLockedUntil = 0;
          this.pufferfishHintState = 'safe';
          this.pufferfishHintTimer = null;
          this.pufferfishSafeTimer = null;
          this.octopusState = 'safe';
          this.octopusHintState = 'safe';
          this.octopusHintTimer = null;
          this.octopusSafeTimer = null;
          this.octopusOverlayHideTimer = null;
          this.hedgehogHintTimer = null;
          this.hedgehogSafeTimer = null;

          this.models = {
            pufferfish: document.getElementById('pufferfish'),
            octopus: document.getElementById('octopus'),
            hedgehog: document.getElementById('hedgehog')
          };

          this.visuals = {
            pufferfish: document.getElementById('pufferfish-model'),
            octopus: document.getElementById('octopus-model'),
            hedgehog: document.getElementById('hedgehog-model')
          };

          this.visualScales = {
            pufferfishNormal: new THREE.Vector3(0.002, 0.002, 0.002),
            pufferfishPressed: new THREE.Vector3(0.0022, 0.0007, 0.0022),
            octopusNormal: new THREE.Vector3(0.18, 0.18, 0.18)
          };
          this.HEDGEHOG_YAW = HEDGEHOG_YAW;
          this.placementFacingYaw = 0;
          this.visualYawOffsets = {
            pufferfish: 0,
            octopus: 0,
            hedgehog: THREE.MathUtils.degToRad(this.HEDGEHOG_YAW)
          };

          this.modeSelector.addEventListener('beforexrselect', e => e.preventDefault());
          document.getElementById('reset-placement').addEventListener('beforexrselect', e => e.preventDefault());
          document.getElementById('reset-placement').addEventListener('click', () => this.resetPlacement());
          if (this.returnHomeEl) {
             this.returnHomeEl.addEventListener('beforexrselect', e => e.preventDefault());
             this.returnHomeEl.addEventListener('click', () => this.returnToHome());
          }
          if (this.placementDebugToggleEl) {
             this.placementDebugToggleEl.addEventListener('beforexrselect', e => e.preventDefault());
             this.placementDebugToggleEl.addEventListener('click', () => {
                this.placementDebugExpanded = !this.placementDebugExpanded;
                this.placementDebugEl.classList.toggle('expanded', this.placementDebugExpanded);
             });
          }
          if (this.startExperienceEl && this.welcomeOverlayEl) {
             this.startExperienceEl.addEventListener('beforexrselect', e => e.preventDefault());
             this.startExperienceEl.addEventListener('click', () => {
                this.startExperienceEl.disabled = true;
                if (this.welcomeEntryNoteEl) this.welcomeEntryNoteEl.innerText = '';
                this.tryStartARFromWelcome();
             });
          }
          this.el.sceneEl.addEventListener('enter-vr', () => {
             if (this.welcomeOverlayEl) this.welcomeOverlayEl.classList.add('hidden');
          });

          document.getElementById('btn-octopus').addEventListener('click', () => {
             if (!this.motionListening) {
                if (typeof DeviceMotionEvent === 'undefined') {
                    this.motionPermissionState = 'unsupported';
                } else if (typeof DeviceMotionEvent.requestPermission === 'function') {
                    DeviceMotionEvent.requestPermission().then(permissionState => {
                        this.motionPermissionState = permissionState;
                        if (permissionState === 'granted') {
                            window.addEventListener('devicemotion', this.handleMotion.bind(this));
                            this.motionListening = true;
                            this.motionPermissionState = 'listening';
                        }
                    }).catch(error => {
                        this.motionPermissionState = 'denied';
                        console.error(error);
                    });
                } else {
                    window.addEventListener('devicemotion', this.handleMotion.bind(this));
                    this.motionListening = true;
                    this.motionPermissionState = 'listening';
                }
             }
             this.switchMode('octopus');
          });

          document.getElementById('btn-pufferfish').addEventListener('click', () => this.switchMode('pufferfish'));
          document.getElementById('btn-hedgehog').addEventListener('click', () => this.switchMode('hedgehog'));

          // [\u4fee\u6539\u70b9] \u76d1\u542c\u653e\u7f6e\u6210\u529f\u4e8b\u4ef6\uff0c\u843d\u5730\u77ac\u95f4\u5f3a\u5236\uff08\u66b4\u529b\uff09\u8986\u5199 UI \u6587\u5b57
          this.el.addEventListener('monster-spawned', (e) => {
             this.isSpawned = true;
             this.spawnPosition = new THREE.Vector3().copy(e.detail.position);
             this.reticlePosition = e.detail.reticlePosition ? new THREE.Vector3().copy(e.detail.reticlePosition) : new THREE.Vector3().copy(e.detail.position);
             this.correctedAnchorPosition = new THREE.Vector3().copy(this.spawnPosition);
             Object.keys(this.models).forEach(key => {
                 this.models[key].setAttribute('position', { x: this.spawnPosition.x, y: this.spawnPosition.y, z: this.spawnPosition.z });
             });
             this.faceVisualsToCameraOnce();
             this.showAnimal(this.mode);
             this.updateHint(this.getSafeHint(this.mode));
          });

          this.el.addEventListener('hint-message', (e) => {
             if (e.detail && e.detail.message) this.updateHint(e.detail.message);
          });

          this.switchMode(this.mode);

          // === 模型加载后清理：删除模型内嵌的巨大背景平面 ===
          var self = this;

          function cleanupModel(el) {
              if (!el) return;
              el.addEventListener('model-loaded', function() {
                  var toRemove = [];
                  el.object3D.traverse(function(child) {
                      if (child.isMesh) {
                          child.geometry.computeBoundingBox();
                          var box = child.geometry.boundingBox;
                          var size = new THREE.Vector3();
                          box.getSize(size);
                          // 如果某个 mesh 的任何一个维度超过 5 单位，判定为背景/地面
                          if (size.x > 5 || size.y > 5 || size.z > 5) {
                              toRemove.push(child);
                          }
                      }
                  });
                  toRemove.forEach(function(mesh) {
                      mesh.parent.remove(mesh);
                      console.log('Removed background mesh:', mesh.name, mesh.geometry.boundingBox);
                  });
              });
          }

          cleanupModel(this.visuals.hedgehog);

          if (this.visuals.pufferfish) this.visuals.pufferfish.addEventListener('model-loaded', function() {
              var box = new THREE.Box3().setFromObject(self.visuals.pufferfish.object3D);
              var center = new THREE.Vector3();
              var size = new THREE.Vector3();
              box.getCenter(center);
              box.getSize(size);
              console.log('Pufferfish model loaded', {
                  center: { x: center.x, y: center.y, z: center.z },
                  size: { x: size.x, y: size.y, z: size.z }
              });
          });

          // 刺猬模型加载完成后，保存其原始材质以便故障后恢复
          if (this.visuals.hedgehog) this.visuals.hedgehog.addEventListener('model-loaded', function() {
              self.applyHedgehogYaw();
              self.saveHedgehogMaterial();
          });
        },

        handleMotion: function(event) {
             this.lastMotionTime = performance.now();
             if (this.mode !== 'octopus' || !this.isOctopusAttached) return;
             
             var acc = event.accelerationIncludingGravity || event.acceleration;
             if (!acc || acc.x === null) return;
             
             if (this.lastAcc) {
                 var dx = Math.abs(acc.x - this.lastAcc.x);
                 var dy = Math.abs(acc.y - this.lastAcc.y);
                 var dz = Math.abs(acc.z - this.lastAcc.z);
                 var deltaSum = dx + dy + dz;
                 this.lastShakeDelta = deltaSum;
                 
                if (deltaSum > 25 && this.octopusState === 'readyToShake') {
                     this.motionReleaseCount++;
                     this.releaseOctopus();
                 } else if (deltaSum > 25 && this.octopusState === 'stuckTooClose') {
                     this.setOctopusHintState('stuckTooClose');
                 }
             }
             this.lastAcc = { x: acc.x, y: acc.y, z: acc.z };
        },

        tryStartARFromWelcome: function() {
           var scene = this.el.sceneEl || this.el;
           var finish = () => {
              if (this.welcomeOverlayEl) this.welcomeOverlayEl.classList.add('hidden');
              if (this.startExperienceEl) this.startExperienceEl.disabled = false;
           };
           var fallback = () => {
              if (this.startExperienceEl) this.startExperienceEl.disabled = false;
              if (this.welcomeEntryNoteEl) this.welcomeEntryNoteEl.innerText = '请点击 AR 按钮进入体验。';
              this.updateHint('请点击 AR 按钮进入体验。');
           };

           try {
              if (scene.is && (scene.is('ar-mode') || scene.is('vr-mode'))) {
                 finish();
                 return;
              }
              var enterAR = scene.enterAR || scene.enterVR;
              if (!enterAR) {
                 fallback();
                 return;
              }
              var result = enterAR.call(scene);
              Promise.resolve(result).then(() => {
                 setTimeout(() => {
                    if (scene.is && (scene.is('ar-mode') || scene.is('vr-mode'))) finish();
                    else fallback();
                 }, 300);
              }).catch(fallback);
           } catch (error) {
              console.warn('AR entry failed:', error);
              fallback();
           }
        },

        releaseOctopus: function() {
           if (this.octopusState !== 'readyToShake') return;
           this.enterOctopusCooldown();
        },

        switchMode: function (newMode) {
          this.mode = newMode;
          this.clearHintTimers(true);
          this.hideOctopusFilter();
          this.octopusState = 'safe';
          this.octopusHintState = 'safe';
          this.isOctopusAttached = false;
          this.octopusCooldown = 0;

          document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
          document.getElementById(`btn-${newMode}`).classList.add('active');

          if (this.isSpawned) {
             this.showAnimal(newMode);
          } else {
             this.hideAllAnimals();
          }

          if (this.visuals.octopus) {
             this.visuals.octopus.object3D.position.set(0, 0, 0); 
             this.visuals.octopus.object3D.scale.copy(this.visualScales.octopusNormal);
          }
          if (this.visuals.pufferfish) {
             this.visuals.pufferfish.object3D.scale.copy(this.visualScales.pufferfishNormal);
          }
          // [初始化与重置] 切入或切出刺猬模式时，恢复冷淡怠速状态
          if (this.models.hedgehog) {
             this.hedgehogState = 'idle';
             if (newMode === 'hedgehog') this.hedgehogSlowApproachPraised = false;
             if (this.hedgehogTimer) clearTimeout(this.hedgehogTimer);
             this.hedgehogTimer = null;
             this.restoreHedgehogMaterial();
          }

          // [修改点 2] 智慧型 UI 提示逻辑：未放置前显示当前选择的模式 + 引导；放置后显示怪兽台词
          var modeNames = { 'pufferfish': '河豚', 'octopus': '章鱼', 'hedgehog': '刺猬' };
          var currentName = modeNames[newMode];

          if (!this.isSpawned) {
              this.updateHint('找一块平坦的地面，把小动物放下来。');
          } else {
              this.updateHint(this.getSafeHint(newMode));
          }
        },

        tick: function (time, timeDelta) {
          if (!this.isSpawned || !this.spawnPosition) {
             if (this.uiEl) this.uiEl.innerText = 'Scan & TAP Space';
             // [修改点 3] 仅在文字为空时才设定初始引导语，不每帧强制覆盖
             if (this.instructionEl && !this.instructionEl.innerText) this.updateHint('找一块平坦的地面，把小动物放下来。');
             return;
          }

          var cameraEl = document.querySelector('[camera]');
          var anchorEl = this.data.anchor;
          if (!cameraEl || !cameraEl.object3D || !anchorEl || !anchorEl.object3D) return;

          var currentCamPos = new THREE.Vector3();
          cameraEl.object3D.getWorldPosition(currentCamPos);
          this.updatePlacementDebug(currentCamPos, time);

          var dt = timeDelta / 1000;
          if (this.octopusCooldown > 0) this.octopusCooldown -= dt;

          var horizCam = new THREE.Vector3(currentCamPos.x, 0, currentCamPos.z);
          var horizAnchor = new THREE.Vector3(this.spawnPosition.x, 0, this.spawnPosition.z);
          var surfaceDistance = Math.max(0, horizCam.distanceTo(horizAnchor) - 0.15);

          // [修改点 1] 计算逼近速度 (Approach Velocity)，有方向性
          // 结果为正 = 正在靠近；结果为负 = 正在后退。去掉 Math.abs() 是关键
          var approachVelocity = 0;
          if (this.previousDistance !== null && dt > 0) {
              approachVelocity = (this.previousDistance - surfaceDistance) / dt;
          }
          this.previousDistance = surfaceDistance;

          if (this.uiEl) {
            this.uiEl.innerText = `[${this.mode.toUpperCase()}]\nDIST: ${surfaceDistance.toFixed(2)}m`;
            if (this.isOctopusAttached) this.uiEl.innerText = `[${this.mode.toUpperCase()}]\nDIST: STUCK!`;
            if (this.mode === 'octopus') {
               this.uiEl.innerText += `\nOCTO STATE: ${this.octopusState}\nMOTION: ${this.motionPermissionState}\nSHAKE: ${this.lastShakeDelta.toFixed(1)}\nRELEASES: ${this.motionReleaseCount}`;
            }
          }

          if (!this.visuals.pufferfish || !this.visuals.octopus) return;
          var pMesh = this.visuals.pufferfish.object3D;
          var oMesh = this.visuals.octopus.object3D;

          switch (this.mode) {
            case 'pufferfish':
              if (surfaceDistance < 0.6) {
                 pMesh.scale.lerp(this.visualScales.pufferfishPressed, 0.15);
                 if (this.pufferfishHintState !== 'close') {
                    this.pufferfishHintState = 'close';
                    this.updateHint('你靠得太近啦，河豚被挤到了。', { minDuration: 1800, priority: 'important' });
                    if (this.pufferfishHintTimer) clearTimeout(this.pufferfishHintTimer);
                    this.pufferfishHintTimer = setTimeout(() => {
                       if (this.mode === 'pufferfish' && this.pufferfishHintState === 'close') this.updateHint('退后一点，给河豚多一点空间。');
                    }, 1800);
                 }
              } else {
                 pMesh.scale.lerp(this.visualScales.pufferfishNormal, 0.15);
                 if (this.pufferfishHintState === 'close') {
                    this.pufferfishHintState = 'recovering';
                    if (this.pufferfishHintTimer) clearTimeout(this.pufferfishHintTimer);
                    this.pufferfishHintTimer = null;
                    this.updateHint('河豚又鼓回来了，距离舒服多了。');
                    if (this.pufferfishSafeTimer) clearTimeout(this.pufferfishSafeTimer);
                    this.pufferfishSafeTimer = setTimeout(() => {
                       if (this.mode === 'pufferfish' && this.pufferfishHintState === 'recovering') {
                          this.pufferfishHintState = 'safe';
                          this.updateHint(this.getSafeHint('pufferfish'));
                       }
                    }, 1400);
                 }
              }
              break;

            case 'octopus':
              if (this.isOctopusAttached && (this.lastMotionTime === 0 || performance.now() - this.lastMotionTime > 2000)) {
                 this.updateHint('没有检测到晃动权限，请点章鱼按钮重新授权。');
              }
              if (this.octopusState !== 'triggered' && this.octopusState !== 'stuckTooClose' && this.octopusState !== 'readyToShake') {
                 oMesh.position.lerp(new THREE.Vector3(0, 0, 0), 0.1);
                 oMesh.scale.lerp(this.visualScales.octopusNormal, 0.1);
              }

              if (this.octopusState === 'safe' && surfaceDistance < 0.5) {
                 this.enterOctopusTriggered();
              } else if (this.octopusState === 'stuckTooClose' && surfaceDistance >= 0.8) {
                 this.enterOctopusReadyToShake();
              } else if (this.octopusState === 'readyToShake' && surfaceDistance < 0.8) {
                 this.enterOctopusStuckTooClose();
              }
              break;

            case 'hedgehog':
              // 刺猬模式：延迟满足的戒备交互机制
              // [修改点 2] 只惩罚快速『靠近』行为，approachVelocity > 0 才代表在接近
              if (surfaceDistance >= 0.8) {
                  this.hedgehogSlowApproachPraised = false;
              }

              if (surfaceDistance < 0.6 && approachVelocity > 0.3) {
                  // 1. 刚性防御：冲破阈值，触发报错机制
                  this.hedgehogState = 'alarm';
                  this.hedgehogSlowApproachPraised = false;
                  
                  if (this.hedgehogTimer) {
                      clearTimeout(this.hedgehogTimer);
                      this.hedgehogTimer = null;
                  }
                  
                  this.setGltfMaterial(this.visuals.hedgehog, { color: '#FF8A8A', emissive: '#551111', opacity: 0.88, wireframe: false });
                  
                  this.updateHint('你冲得太快了，刺猬紧张了。', { minDuration: 1800, priority: 'important' });
                  if (this.hedgehogHintTimer) clearTimeout(this.hedgehogHintTimer);
                  this.hedgehogHintTimer = setTimeout(() => {
                     if (this.mode === 'hedgehog' && this.hedgehogState === 'alarm') this.updateHint('退后一点，安静等一等。');
                  }, 1800);
              } 
              else if (this.hedgehogState === 'idle' && surfaceDistance < 0.6 && approachVelocity <= 0.3 && !this.hedgehogSlowApproachPraised) {
                  this.hedgehogSlowApproachPraised = true;
                  this.updateHint('你慢慢靠近了，刺猬觉得很安心。');
              }
              else if (surfaceDistance >= 0.8) {
                  // 2. 延迟抚慰：只有从报错状态退后，才能启动防抖倒计时
                  if (this.hedgehogState === 'alarm') {
                      this.hedgehogState = 'waiting';
                      if (this.hedgehogHintTimer) clearTimeout(this.hedgehogHintTimer);
                      this.hedgehogHintTimer = null;
                      
                      this.updateHint('很好，保持这个距离一会儿。');
                      
                      this.hedgehogTimer = setTimeout(() => {
                          // 3. 最终解锁：如果 3 秒后仍然是在局内待机且没有越界
                          if (this.mode === 'hedgehog' && this.hedgehogState === 'waiting') {
                              this.hedgehogState = 'friend';
                              this.restoreHedgehogMaterial();
                              this.updateHint('刺猬放松了，你慢下来它就安心了。');
                              if (this.hedgehogSafeTimer) clearTimeout(this.hedgehogSafeTimer);
                              this.hedgehogSafeTimer = setTimeout(() => {
                                 if (this.mode === 'hedgehog' && this.hedgehogState === 'friend') {
                                    this.hedgehogState = 'idle';
                                    this.hedgehogSlowApproachPraised = false;
                                    this.updateHint(this.getSafeHint('hedgehog'));
                                 }
                              }, 1600);
                          }
                      }, 3000); // 3 秒耐心考验
                  }
              }
              break;
          }
        },
        
        hideAllAnimals: function() {
          Object.keys(this.models).forEach(key => {
             this.models[key].setAttribute('visible', 'false');
          });
        },

        showAnimal: function(mode) {
          this.hideAllAnimals();
          if (this.models[mode]) this.models[mode].setAttribute('visible', 'true');
        },

        updateHint: function(message, options) {
            var now = performance.now();
            var opts = options || {};
            if (this.hintLockedUntil > now && opts.priority !== 'important') return;
            if (!this.instructionEl || this.currentHint === message) return;
            this.currentHint = message;
            this.instructionEl.innerText = message;
            if (opts.minDuration) this.hintLockedUntil = now + opts.minDuration;
        },

        clearHintTimers: function(resetOctopusState) {
            if (this.pufferfishHintTimer) clearTimeout(this.pufferfishHintTimer);
            if (this.pufferfishSafeTimer) clearTimeout(this.pufferfishSafeTimer);
            if (this.octopusHintTimer) clearTimeout(this.octopusHintTimer);
            if (this.octopusSafeTimer) clearTimeout(this.octopusSafeTimer);
            if (this.octopusOverlayHideTimer) clearTimeout(this.octopusOverlayHideTimer);
            if (this.hedgehogHintTimer) clearTimeout(this.hedgehogHintTimer);
            if (this.hedgehogSafeTimer) clearTimeout(this.hedgehogSafeTimer);
            this.pufferfishHintTimer = null;
            this.pufferfishSafeTimer = null;
            this.octopusHintTimer = null;
            this.octopusSafeTimer = null;
            this.octopusOverlayHideTimer = null;
            this.hedgehogHintTimer = null;
            this.hedgehogSafeTimer = null;
            this.hintLockedUntil = 0;
            if (resetOctopusState) {
                this.octopusState = 'safe';
                this.octopusHintState = 'safe';
            }
        },

        getSafeHint: function(mode) {
            if (mode === 'pufferfish') return '距离刚刚好，河豚很放松。';
            if (mode === 'octopus') return '章鱼在安静地看着你。';
            if (mode === 'hedgehog') return '刺猬喜欢你慢慢靠近。';
            return '慢慢靠近，看看它喜欢多大的空间。';
        },

        setOctopusHintState: function(state) {
            if (this.octopusHintTimer) clearTimeout(this.octopusHintTimer);
            this.octopusHintTimer = null;
            if (this.octopusSafeTimer) clearTimeout(this.octopusSafeTimer);
            this.octopusSafeTimer = null;
            this.octopusHintState = state;

            if (state === 'safe') {
                this.updateHint(this.getSafeHint('octopus'));
                return;
            }
            if (state === 'triggered') {
                this.updateHint('章鱼觉得太近了，喷出了黏黏保护膜。', { minDuration: 1800, priority: 'important' });
                return;
            }
            if (state === 'stuckTooClose') {
                this.hintLockedUntil = 0;
                this.updateHint('太近了，黏液还甩不掉。退远一点再试试。', { priority: 'important' });
                return;
            }
            if (state === 'readyToShake') {
                this.updateHint('很好，现在甩一甩手机，把黏液甩掉。');
                return;
            }
            if (state === 'cooldown') {
                this.updateHint('黏液甩掉了，章鱼放松了。');
            }
        },

        enterOctopusSafe: function() {
            this.clearHintTimers(true);
            this.octopusState = 'safe';
            this.isOctopusAttached = false;
            this.octopusCooldown = 0;
            this.octopusHintState = 'safe';
            this.hideOctopusFilter();
            if (this.models.octopus && this.mode === 'octopus' && this.isSpawned) {
                this.models.octopus.setAttribute('visible', 'true');
            }
            if (this.visuals.octopus) {
                this.visuals.octopus.object3D.position.set(0, 0, 0);
                this.visuals.octopus.object3D.scale.copy(this.visualScales.octopusNormal);
            }
            if (this.mode === 'octopus') this.setOctopusHintState('safe');
        },

        enterOctopusTriggered: function() {
            this.clearHintTimers(false);
            this.octopusState = 'triggered';
            this.isOctopusAttached = true;
            if (this.models.octopus) this.models.octopus.setAttribute('visible', 'false');
            this.showOctopusFilter();
            this.setOctopusHintState('triggered');
            this.octopusHintTimer = setTimeout(() => {
                if (this.mode === 'octopus' && this.octopusState === 'triggered') this.enterOctopusStuckTooClose();
            }, 1800);
        },

        enterOctopusStuckTooClose: function() {
            this.clearHintTimers(false);
            this.octopusState = 'stuckTooClose';
            this.isOctopusAttached = true;
            if (this.models.octopus) this.models.octopus.setAttribute('visible', 'false');
            this.setOctopusHintState('stuckTooClose');
        },

        enterOctopusReadyToShake: function() {
            this.clearHintTimers(false);
            this.octopusState = 'readyToShake';
            this.isOctopusAttached = true;
            if (this.models.octopus) this.models.octopus.setAttribute('visible', 'false');
            if (this.mode === 'octopus') this.setOctopusHintState('readyToShake');
        },

        enterOctopusCooldown: function() {
            this.clearHintTimers(false);
            this.octopusState = 'cooldown';
            this.isOctopusAttached = false;
            this.octopusCooldown = 0;
            this.hideOctopusFilter();
            if (this.models.octopus && this.mode === 'octopus' && this.isSpawned) {
                this.models.octopus.setAttribute('visible', 'true');
            }
            if (this.visuals.octopus) {
                this.visuals.octopus.object3D.position.set(0, 0, 0);
                this.visuals.octopus.object3D.scale.copy(this.visualScales.octopusNormal);
            }
            if (this.mode === 'octopus') this.setOctopusHintState('cooldown');
            this.octopusSafeTimer = setTimeout(() => {
                if (this.mode === 'octopus' && this.octopusState === 'cooldown') this.enterOctopusSafe();
            }, 1400);
        },

        resetPlacement: function() {
            this.isSpawned = false;
            this.spawnPosition = null;
            this.reticlePosition = null;
            this.correctedAnchorPosition = null;
            this.previousDistance = null;
            this.pufferfishHintState = 'safe';
            this.octopusState = 'safe';
            this.octopusHintState = 'safe';
            this.isOctopusAttached = false;
            this.octopusCooldown = 0;
            this.clearHintTimers(true);
            this.hedgehogState = 'idle';
            this.hedgehogSlowApproachPraised = false;
            if (this.hedgehogTimer) clearTimeout(this.hedgehogTimer);
            this.hedgehogTimer = null;
            this.hideOctopusFilter();
            this.hideAllAnimals();
            if (this.visuals.pufferfish) this.visuals.pufferfish.object3D.scale.copy(this.visualScales.pufferfishNormal);
            if (this.visuals.octopus) {
                this.visuals.octopus.object3D.position.set(0, 0, 0);
                this.visuals.octopus.object3D.scale.copy(this.visualScales.octopusNormal);
            }
            this.restoreHedgehogMaterial();
            this.updateHint('换个地方，再把小动物放下来。');
            this.el.sceneEl.emit('placement-reset');
        },

        returnToHome: function() {
            this.resetPlacement();
            this.currentHint = '';
            if (this.welcomeEntryNoteEl) this.welcomeEntryNoteEl.innerText = '';
            if (this.startExperienceEl) this.startExperienceEl.disabled = false;
            if (this.welcomeOverlayEl) this.welcomeOverlayEl.classList.remove('hidden');
            this.updateHint('找一块平坦的地面，把小动物放下来。');
        },

        showOctopusFilter: function() {
            if (!this.octopusFilterEl) return;
            if (this.octopusOverlayHideTimer) clearTimeout(this.octopusOverlayHideTimer);
            this.octopusOverlayHideTimer = null;
            this.octopusFilterEl.classList.remove('active');
            this.octopusFilterEl.style.display = 'block';
            requestAnimationFrame(() => {
                if (this.octopusFilterEl) this.octopusFilterEl.classList.add('active');
            });
        },

        hideOctopusFilter: function() {
            if (!this.octopusFilterEl) return;
            if (this.octopusOverlayHideTimer) clearTimeout(this.octopusOverlayHideTimer);
            this.octopusFilterEl.classList.remove('active');
            this.octopusOverlayHideTimer = setTimeout(() => {
                if (this.octopusFilterEl && !this.octopusFilterEl.classList.contains('active')) {
                    this.octopusFilterEl.style.display = 'none';
                }
                this.octopusOverlayHideTimer = null;
            }, 460);
        },

        applyHedgehogYaw: function() {
            if (!this.visuals.hedgehog || !this.visuals.hedgehog.object3D) return;
            this.visuals.hedgehog.object3D.rotation.y = this.placementFacingYaw + this.visualYawOffsets.hedgehog;
        },

        faceVisualsToCameraOnce: function() {
            if (!this.spawnPosition) return;
            var cameraEl = document.querySelector('[camera]');
            if (!cameraEl || !cameraEl.object3D) return;
            var cameraPos = new THREE.Vector3();
            cameraEl.object3D.getWorldPosition(cameraPos);
            var dx = cameraPos.x - this.spawnPosition.x;
            var dz = cameraPos.z - this.spawnPosition.z;
            if (Math.abs(dx) < 0.001 && Math.abs(dz) < 0.001) return;

            this.placementFacingYaw = Math.atan2(dx, dz);
            Object.keys(this.visuals).forEach(key => {
                if (!this.visuals[key] || !this.visuals[key].object3D) return;
                var offset = this.visualYawOffsets[key] || 0;
                this.visuals[key].object3D.rotation.y = this.placementFacingYaw + offset;
            });
        },

        // === GLTF 材质操作工具 ===
        setGltfMaterial: function(el, opts) {
            if (!el || !el.object3D) return;
            el.object3D.traverse(function(child) {
                if (child.isMesh && child.material) {
                    if (opts.color) child.material.color.set(opts.color);
                    if (opts.emissive && child.material.emissive) child.material.emissive.set(opts.emissive);
                    if (opts.opacity !== undefined) {
                        child.material.transparent = opts.opacity < 1;
                        child.material.opacity = opts.opacity;
                    }
                    if (opts.wireframe !== undefined) child.material.wireframe = opts.wireframe;
                }
            });
        },

        restoreHedgehogMaterial: function() {
            if (!this.visuals.hedgehog || !this.visuals.hedgehog.object3D) return;
            var self = this;
            if (this.hedgehogOriginalMaterials.length > 0) {
                // 恢复保存的原始材质
                var i = 0;
                this.visuals.hedgehog.object3D.traverse(function(child) {
                    if (child.isMesh && self.hedgehogOriginalMaterials[i]) {
                        child.material = self.hedgehogOriginalMaterials[i].clone();
                        i++;
                    }
                });
            } else {
                // 如果还没保存过，只重置颜色和线框
                this.setGltfMaterial(this.visuals.hedgehog, { color: '#888888', wireframe: false });
            }
        },

        saveHedgehogMaterial: function() {
            if (!this.visuals.hedgehog || !this.visuals.hedgehog.object3D) return;
            if (this.hedgehogOriginalMaterials.length > 0) return; // 只保存一次
            var self = this;
            this.visuals.hedgehog.object3D.traverse(function(child) {
                if (child.isMesh && child.material) {
                    self.hedgehogOriginalMaterials.push(child.material.clone());
                }
            });
        },

        formatVec: function(vec) {
            if (!vec) return 'n/a';
            return `${vec.x.toFixed(2)}, ${vec.y.toFixed(2)}, ${vec.z.toFixed(2)}`;
        },

        getWorldVec: function(el) {
            if (!el || !el.object3D) return null;
            var pos = new THREE.Vector3();
            el.object3D.getWorldPosition(pos);
            return pos;
        },

        updatePlacementDebug: function(cameraPos, time) {
            if (!this.placementDebugEnabled || !this.placementDebugBodyEl || !this.placementDebugExpanded || time - this.lastDebugUpdate < 250) return;
            this.lastDebugUpdate = time;
            this.placementDebugBodyEl.innerText =
                `placed: ${this.isSpawned}\n` +
                `reticle: ${this.formatVec(this.reticlePosition)}\n` +
                `anchor: ${this.formatVec(this.correctedAnchorPosition)}\n` +
                `camera: ${this.formatVec(cameraPos)}\n` +
                `puffer: ${this.formatVec(this.getWorldVec(this.models.pufferfish))}\n` +
                `octopus: ${this.formatVec(this.getWorldVec(this.models.octopus))}\n` +
                `hedgehog: ${this.formatVec(this.getWorldVec(this.models.hedgehog))}\n` +
                `octo state: ${this.octopusState}\n` +
                `motion: ${this.motionPermissionState}\n` +
                `shake: ${this.lastShakeDelta.toFixed(1)}\n` +
                `releases: ${this.motionReleaseCount}`;
        }
      });

      AFRAME.registerComponent('ar-hit-test-placer', {
        schema: {
          target: { type: 'selector' }
        },
        init: function () {
          this.xrHitTestSource = null;
          this.viewerSpace = null;
          this.refSpace = null;
          this.groundYOffset = -0.08;
          this.hasPlaced = false; // [修复一] 放置锁，防止幽灵光圈持续跟随
          this.lastHintMessage = '';

          this.el.sceneEl.addEventListener('enter-vr', () => {
            if (!this.el.sceneEl.is('ar-mode')) return;
            var session = this.el.sceneEl.renderer.xr.getSession();
            
            session.requestReferenceSpace('viewer').then((space) => {
              this.viewerSpace = space;
              session.requestHitTestSource({ space: this.viewerSpace }).then((hitTestSource) => {
                this.xrHitTestSource = hitTestSource;
              });
            });

            session.requestReferenceSpace('local-floor').then((space) => {
              this.refSpace = space;
            });

            session.addEventListener('select', (event) => {
              if (!this.el.getAttribute('visible')) return;
              if (this.hasPlaced) return; // [修复一] 已放置则拦截重复触发
              var anchorEl = this.data.target;
              if (anchorEl) {
                var reticlePos = new THREE.Vector3();
                this.el.object3D.getWorldPosition(reticlePos);
                var correctedAnchorPosition = new THREE.Vector3().copy(reticlePos);
                correctedAnchorPosition.y += this.groundYOffset;
                anchorEl.setAttribute('position', { x: 0, y: 0, z: 0 });
                anchorEl.setAttribute('visible', 'true');
                this.el.sceneEl.emit('monster-spawned', { position: correctedAnchorPosition, reticlePosition: reticlePos });
                // [修复一] 放置后锁定并隐藏光圈
                this.hasPlaced = true;
                this.el.setAttribute('visible', 'false');
              }
            });
          });

          this.el.sceneEl.addEventListener('placement-reset', () => {
            this.hasPlaced = false;
            this.lastHintMessage = '';
            this.el.setAttribute('visible', 'true');
          });
        },
        emitHint: function(message) {
          if (this.lastHintMessage === message) return;
          this.lastHintMessage = message;
          this.el.sceneEl.emit('hint-message', { message: message });
        },
        tick: function () {
          if (this.hasPlaced) return; // [修复一] 已放置，停止光圈更新
          if (!this.el.sceneEl.is('ar-mode')) return;
          var frame = this.el.sceneEl.frame;
          if (!frame) return;

          var xrHitTestSource = this.xrHitTestSource;
          var refSpace = this.refSpace;

          // [\u4fee\u6539\u70b9] \u83b7\u53d6 UI \u6587\u672c\u5143\u7d20
          var instructionEl = document.getElementById('instruction-text');

          if (xrHitTestSource && refSpace) {
            var hitTestResults = frame.getHitTestResults(xrHitTestSource);
            if (hitTestResults.length > 0) {
              var hit = hitTestResults[0];
              var pose = hit.getPose(refSpace);
              this.el.setAttribute('visible', 'true');
              this.el.object3D.position.set(pose.transform.position.x, pose.transform.position.y, pose.transform.position.z);
              // [\u65b0\u589e] \u6293\u5230\u5730\u9762\u65f6\uff0c\u7ed9\u4e88\u5f3a\u70c8\u7684\u7eff\u8272\u89c6\u89c9\u786e\u8ba4
              if (!this.hasPlaced) this.emitHint('找到了地面，点一下把小动物放下来。');
            } else {
              this.el.setAttribute('visible', 'false');
              // [\u65b0\u589e] \u4e22\u5931\u5e73\u9762\u65f6\u5f15\u5bfc\u7528\u6237\u79fb\u52a8\u624b\u673a\u5bfb\u627e\u7279\u5f81\u70b9
              if (!this.hasPlaced) this.emitHint('找一块平坦的地面，把小动物放下来。');
            }
          }
        }
      });
    </script>
  </head>
  <body>
    <!-- DOM Overlay系统（UI面板） -->
    <div id="ar-ui-layer">
      <div id="welcome-overlay">
        <section class="welcome-shell" aria-label="邊界生態箱開始畫面">
          <div class="welcome-copy">
            <div class="welcome-brand">
              <span class="welcome-mark" aria-hidden="true"></span>
              <span>给小朋友的 AR 距离练习<br>A gentle AR space-learning toy for children</span>
            </div>
            <h1>邊界生態箱</h1>
            <h2>The Boundary Terrarium</h2>
            <p>探索小动物喜欢的距离，<br>学习慢慢靠近与尊重空间。</p>
            <button id="start-experience" type="button">开始体验</button>
            <div class="welcome-entry-note" aria-live="polite"></div>
          </div>
          <div class="welcome-terrarium" aria-hidden="true">
            <div class="welcome-visual-placeholder">
              <div class="welcome-creature-card">
                <span class="welcome-orbit one"></span>
                <span class="welcome-animal puffer"><img src="assets/ui/cute-puffer.png" alt=""></span>
                <span class="welcome-tag space">需要多一点空间</span>
              </div>
              <div class="welcome-creature-card">
                <span class="welcome-orbit two"></span>
                <span class="welcome-animal octopus"><img src="assets/ui/cute-octopus.png" alt=""></span>
                <span class="welcome-tag repair">退远再甩掉黏液</span>
              </div>
              <div class="welcome-creature-card">
                <span class="welcome-orbit three"></span>
                <span class="welcome-animal hedgehog"><img src="assets/ui/cute-hedgehog.png" alt=""></span>
                <span class="welcome-tag slow">慢慢靠近才安心</span>
              </div>
            </div>
            <span class="welcome-note">观察 · 理解 · 尊重</span>
          </div>
        </section>
      </div>
      
      <!-- [新增] 2D 全萤幕绿色贴脸糊层 -->
      <div id="octopus-screen-filter"></div>

      <div id="distance-ui">Initializing AR...</div>
      <div id="ar-top-actions">
        <button id="reset-placement">重新放置</button>
        <button id="return-home">返回首页</button>
      </div>
      <div id="placement-debug">
        <button id="placement-debug-toggle">DEBUG</button>
        <div id="placement-debug-body"></div>
      </div>
      <div id="instruction-text"></div>

      <div id="mode-selector">
        <button class="mode-btn active" id="btn-pufferfish">
          <img src="assets/ui/cute-puffer.png" alt="河豚">
          <span>河豚</span>
        </button>
        <button class="mode-btn" id="btn-octopus">
          <img src="assets/ui/cute-octopus.png" alt="章鱼">
          <span>章鱼</span>
        </button>
        <button class="mode-btn" id="btn-hedgehog">
          <img src="assets/ui/cute-hedgehog.png" alt="刺猬">
          <span>刺猬</span>
        </button>
      </div>
    </div>

    <!-- 并入 ar-game-manager -->
    <a-scene ar-game-manager="anchor: #monster-anchor" webxr="requiredFeatures: hit-test, local-floor; optionalFeatures: dom-overlay; overlayElement: #ar-ui-layer;">
      <a-assets>
        <a-asset-item id="asset-pufferfish" src="assets/pufferfish.glb"></a-asset-item>
        <a-asset-item id="asset-octopus" src="assets/octopus.glb"></a-asset-item>
        <a-asset-item id="asset-hedgehog" src="assets/hedgehog.glb"></a-asset-item>
      </a-assets>
      
      <a-entity id="rig"><a-camera position="0 1.6 0"></a-camera></a-entity>

      <!-- [修改点 2] 增大光圈、荧光绿色、加入呼吸脉冲动画，大幅提升可见度 -->
      <a-entity id="reticle"
        geometry="primitive: ring; radiusInner: 0.15; radiusOuter: 0.2"
        material="color: #00FF00; shader: flat; opacity: 0.9; transparent: true"
        rotation="-90 0 0"
        visible="false"
        ar-hit-test-placer="target: #monster-anchor"
        animation="property: scale; from: 1 1 1; to: 1.3 1.3 1.3; dir: alternate; dur: 800; loop: true; easing: easeInOutSine">
      </a-entity>

      <!-- 共享锚点基站：使用 GLTF 3D 模型 -->
      <a-entity id="monster-anchor" visible="false">
         <a-entity id="pufferfish" position="0 0 0">
           <a-gltf-model id="pufferfish-model" src="#asset-pufferfish" position="0 0.35 0" scale="0.002 0.002 0.002"></a-gltf-model>
         </a-entity>
         <a-entity id="octopus" position="0 0 0">
           <a-gltf-model id="octopus-model" src="#asset-octopus" scale="0.18 0.18 0.18"></a-gltf-model>
         </a-entity>
         <a-entity id="hedgehog" position="0 0 0">
           <a-gltf-model id="hedgehog-model" src="#asset-hedgehog" scale="0.4 0.4 0.4"></a-gltf-model>
         </a-entity>
      </a-entity>

      <a-plane visible="false" position="0 0 -4" rotation="-90 0 0" width="10" height="10" color="#7BC8A4"></a-plane>
      <a-entity light="type: ambient; color: #BBB"></a-entity>
      <a-entity light="type: directional; color: #FFF; intensity: 0.6" position="-0.5 1 1"></a-entity>
      
    </a-scene>
  </body>
</html>
